<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todolist</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head> 

<body class="bg-zinc-900 text-white flex items-center justify-center min-h-screen">

    <div class="bg-zinc-800 p-6 rounded-2xl shadow-lg w-full max-w-md">

        <!-- Título -->
        <h1 class="text-2xl font-bold mb-4 text-center">Todo List</h1>

        <!-- Input + botão -->
        <div class="flex gap-2">
            <input 
                id="inputTask" 
                type="text" 
                placeholder="Digite uma tarefa..." 
                class="flex-1 bg-zinc-700 border border-zinc-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500"
            >

            <button 
                id="addTask" 
                class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-semibold transition"
            >
                Add
            </button>
        </div>

        <!-- Lista -->
        <ul id="taskList" class="mt-4 space-y-2"></ul>

    </div>

<script src="script.js"></script>
</body>
</html>
